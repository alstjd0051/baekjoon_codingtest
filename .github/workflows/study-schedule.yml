name: Study Schedule Reminder

on:
  schedule:
    # 09:05 KST (00:05 UTC) daily
    - cron: "5 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve today's problem in KST
        id: today
        run: |
          python - <<'PY'
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo
          import os

          from crawl_boj_problems import parse_readme_table

          rows = parse_readme_table(Path("README.md").read_text(encoding="utf-8"))
          schedule = {row[0]: (row[1], row[2].strip()) for row in rows}

          today = datetime.now(ZoneInfo("Asia/Seoul")).date().isoformat()
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              if today not in schedule:
                  out.write("active=false\n")
                  out.write(f"date={today}\n")
              else:
                  pid, title = schedule[today]
                  out.write("active=true\n")
                  out.write(f"date={today}\n")
                  out.write(f"problem_id={pid}\n")
                  out.write(f"problem_title={title}\n")
                  out.write(f"boj_url=https://www.acmicpc.net/problem/{pid}\n")
                  out.write(f"doc_path=docs/problems/{pid}.md\n")
          PY

      - name: Write summary
        run: |
          if [ "${{ steps.today.outputs.active }}" != "true" ]; then
            {
              echo "## 코테 스터디 일정 알림 (README.md)"
              echo ""
              echo "- 오늘(KST): ${{ steps.today.outputs.date }}"
              echo "- \`README.md\` 주차별 표에 해당 날짜 일정이 없습니다."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "## 코테 스터디 일정 알림 (README.md)"
            echo ""
            echo "- 일정 출처: [\`README.md\` 주차별 문제 일정](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}/README.md)"
            echo "- 날짜(KST): ${{ steps.today.outputs.date }}"
            echo "- 오늘의 문제: [${{ steps.today.outputs.problem_id }} - ${{ steps.today.outputs.problem_title }}](${{ steps.today.outputs.boj_url }})"
            echo "- 문제 노트 경로(로컬 \`crawl_boj_problems.py\` 시): \`${{ steps.today.outputs.doc_path }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create issue for today's problem
        if: steps.today.outputs.active == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const date = "${{ steps.today.outputs.date }}";
            const problemId = "${{ steps.today.outputs.problem_id }}";
            const problemTitle = "${{ steps.today.outputs.problem_title }}";
            const bojUrl = "${{ steps.today.outputs.boj_url }}";
            const docPath = "${{ steps.today.outputs.doc_path }}";
            const title = `[코테스터디] ${date} - ${problemId} ${problemTitle}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all",
              per_page: 100,
            });

            const exists = issues.find((i) => i.title === title);
            if (exists) {
              core.info(`이미 생성된 이슈가 있어 생성을 건너뜁니다: #${exists.number}`);
              return;
            }

            const body = [
              "오늘의 코딩테스트 스터디 문제입니다. (일정: `README.md` 주차별 표)",
              "",
              "cc @hwirim @kjs33322222-alt",
              "",
              `- 날짜: ${date} (KST)`,
              `- 문제: [${problemId} - ${problemTitle}](${bojUrl})`,
              `- 문제 노트: \`${docPath}\``,
              "",
              "체크리스트",
              "- [ ] 문제 읽기",
              "- [ ] 풀이 구현",
              "- [ ] 예외 케이스 점검",
              "- [ ] README/메모 정리",
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["study-schedule", "boj"],
            });

      - name: Send 코테 스터디 일정 알림 to Slack
        if: steps.today.outputs.active == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          README_URL: ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}/README.md
          DATE: ${{ steps.today.outputs.date }}
          PROBLEM_ID: ${{ steps.today.outputs.problem_id }}
          PROBLEM_TITLE: ${{ steps.today.outputs.problem_title }}
          BOJ_URL: ${{ steps.today.outputs.boj_url }}
          DOC_PATH: ${{ steps.today.outputs.doc_path }}
          DOC_URL: ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}/${{ steps.today.outputs.doc_path }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::저장소 Secrets에 SLACK_WEBHOOK_URL이 없어 Slack으로 보내지 않습니다."
            {
              echo ""
              echo "### Slack"
              echo "웹훅 미설정으로 알림을 건너뜀. [Incoming Webhook](https://api.slack.com/messaging/webhooks) URL을 \`SLACK_WEBHOOK_URL\` 시크릿으로 등록하세요."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          python - <<'PY'
          import json
          import os
          import urllib.request

          date = os.environ["DATE"]
          pid = os.environ["PROBLEM_ID"]
          title = os.environ["PROBLEM_TITLE"]
          boj = os.environ["BOJ_URL"]
          doc_path = os.environ["DOC_PATH"]
          doc_url = os.environ["DOC_URL"]
          readme = os.environ["README_URL"]

          fallback = (
              f"[코테 스터디 일정 알림] {date} (KST) — {pid} {title}\n{boj}"
          )
          blocks = [
              {
                  "type": "header",
                  "text": {"type": "plain_text", "text": "코테 스터디 일정 알림"},
              },
              {
                  "type": "section",
                  "text": {
                      "type": "mrkdwn",
                      "text": (
                          f"*오늘(KST)*: `{date}`\n"
                          f"*일정*: <{readme}|README.md 주차별 표>\n"
                          f"*오늘의 문제*: <{boj}|{pid} — {title}>\n"
                          f"*문제 노트*: <{doc_url}|{doc_path}>\n"
                      ),
                  },
              },
          ]
          payload = json.dumps({"text": fallback, "blocks": blocks}).encode("utf-8")
          req = urllib.request.Request(
              os.environ["SLACK_WEBHOOK_URL"],
              data=payload,
              headers={"Content-Type": "application/json"},
          )
          urllib.request.urlopen(req).read()
          PY

          echo "Slack 알림 전송 완료" >> "$GITHUB_STEP_SUMMARY"
