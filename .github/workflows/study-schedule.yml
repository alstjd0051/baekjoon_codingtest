name: Study Schedule Reminder

on:
  schedule:
    # 09:05 KST (00:05 UTC) daily
    - cron: "5 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Resolve today's problem in KST
        id: today
        run: |
          python - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os

          schedule = {
              "2026-04-06": ("1629", "кіұм…Ҳ"),
              "2026-04-07": ("11509", "н’Қм„  л§һм¶”кё°"),
              "2026-04-08": ("14425", "л¬ёмһҗм—ҙ м§‘н•©"),
              "2026-04-09": ("9012", "кҙ„нҳё"),
              "2026-04-10": ("1655", "к°ҖмҡҙлҚ°лҘј л§җн•ҙмҡ”"),
              "2026-04-11": ("5430", "AC"),
              "2026-04-12": ("11286", "м ҲлҢ“к°’ нһҷ"),
              "2026-04-13": ("3107", "IPv6"),
              "2026-04-14": ("1141", "м ‘л‘җмӮ¬"),
              "2026-04-15": ("20529", "к°ҖмһҘ к°Җк№Ңмҡҙ м„ё мӮ¬лһҢмқҳ мӢ¬лҰ¬м Ғ кұ°лҰ¬"),
              "2026-04-16": ("9251", "LCS"),
              "2026-04-17": ("11478", "м„ңлЎң лӢӨлҘё л¶Җл¶„ л¬ёмһҗм—ҙмқҳ к°ңмҲҳ"),
              "2026-04-18": ("3568", "iSharp"),
              "2026-04-19": ("6324", "URLs"),
              "2026-04-20": ("1260", "DFSмҷҖ BFS"),
              "2026-04-21": ("2644", "мҙҢмҲҳкі„мӮ°"),
              "2026-04-22": ("7576", "нҶ л§ҲнҶ "),
              "2026-04-23": ("14725", "к°ңлҜёкөҙ"),
              "2026-04-24": ("12849", "ліёлҢҖ мӮ°мұ…"),
              "2026-04-25": ("3273", "л‘җ мҲҳмқҳ н•©"),
              "2026-04-26": ("2467", "мҡ©м•Ў"),
              "2026-04-27": ("11053", "к°ҖмһҘ кёҙ мҰқк°Җн•ҳлҠ” л¶Җл¶„ мҲҳм—ҙ"),
              "2026-04-28": ("1912", "м—°мҶҚн•©"),
              "2026-04-29": ("14728", "лІјлқҪм№ҳкё°"),
              "2026-04-30": ("9252", "LCS2"),
              "2026-05-01": ("1005", "ACM Craft"),
              "2026-05-02": ("13706", "м ңкіұк·ј"),
              "2026-05-03": ("10827", "a^b"),
          }

          today = datetime.now(ZoneInfo("Asia/Seoul")).date().isoformat()
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              if today not in schedule:
                  out.write("active=false\n")
                  out.write(f"date={today}\n")
              else:
                  pid, title = schedule[today]
                  out.write("active=true\n")
                  out.write(f"date={today}\n")
                  out.write(f"problem_id={pid}\n")
                  out.write(f"problem_title={title}\n")
                  out.write(f"boj_url=https://www.acmicpc.net/problem/{pid}\n")
                  out.write(f"folder=boj-{pid}\n")
          PY

      - name: Write summary
        run: |
          if [ "${{ steps.today.outputs.active }}" != "true" ]; then
            {
              echo "## мҪ”н…Ң мҠӨн„°л”” мқјм • м•ҢлҰј"
              echo ""
              echo "- мҳӨлҠҳ(KST): ${{ steps.today.outputs.date }}"
              echo "- мҳӨлҠҳмқҖ л“ұлЎқлҗң мҠӨн„°л”” л¬ём ңк°Җ м—ҶмҠөлӢҲлӢӨ."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "## мҪ”н…Ң мҠӨн„°л”” мқјм • м•ҢлҰј"
            echo ""
            echo "- лӮ м§ң(KST): ${{ steps.today.outputs.date }}"
            echo "- мҳӨлҠҳмқҳ л¬ём ң: [${{ steps.today.outputs.problem_id }} - ${{ steps.today.outputs.problem_title }}](${{ steps.today.outputs.boj_url }})"
            echo "- лЎңм»¬ нҸҙлҚ” к¶ҢмһҘ: \`${{ steps.today.outputs.folder }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create issue for today's problem
        if: steps.today.outputs.active == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const date = "${{ steps.today.outputs.date }}";
            const problemId = "${{ steps.today.outputs.problem_id }}";
            const problemTitle = "${{ steps.today.outputs.problem_title }}";
            const bojUrl = "${{ steps.today.outputs.boj_url }}";
            const folder = "${{ steps.today.outputs.folder }}";
            const title = `[мҪ”н…ҢмҠӨн„°л””] ${date} - ${problemId} ${problemTitle}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all",
              per_page: 100,
            });

            const exists = issues.find((i) => i.title === title);
            if (exists) {
              core.info(`мқҙлҜё мғқм„ұлҗң мқҙмҠҲк°Җ мһҲм–ҙ мғқм„ұмқ„ кұҙл„ҲлңҒлӢҲлӢӨ: #${exists.number}`);
              return;
            }

            const body = [
              "мҳӨлҠҳмқҳ мҪ”л”©н…ҢмҠӨнҠё мҠӨн„°л”” л¬ём ңмһ…лӢҲлӢӨ.",
              "",
              `- лӮ м§ң: ${date} (KST)`,
              `- л¬ём ң: [${problemId} - ${problemTitle}](${bojUrl})`,
              `- к¶ҢмһҘ нҸҙлҚ”лӘ…: \`${folder}\``,
              "",
              "мІҙнҒ¬лҰ¬мҠӨнҠё",
              "- [ ] л¬ём ң мқҪкё°",
              "- [ ] н’Җмқҙ кө¬нҳ„",
              "- [ ] мҳҲмҷё мјҖмқҙмҠӨ м җкІҖ",
              "- [ ] README/л©”лӘЁ м •лҰ¬",
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["study-schedule", "boj"],
            });

      - name: Send Slack daily notification
        if: steps.today.outputs.active == 'true' && env.SLACK_WEBHOOK_URL != ''
        env:
          DATE: ${{ steps.today.outputs.date }}
          PROBLEM_ID: ${{ steps.today.outputs.problem_id }}
          PROBLEM_TITLE: ${{ steps.today.outputs.problem_title }}
          BOJ_URL: ${{ steps.today.outputs.boj_url }}
          FOLDER: ${{ steps.today.outputs.folder }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          text = (
              "рҹ“ҡ *мҪ”н…Ң мҠӨн„°л”” мҳӨлҠҳмқҳ л¬ём ң м•ҢлҰј*\n"
              f"- лӮ м§ң(KST): {os.environ['DATE']}\n"
              f"- л¬ём ң: <{os.environ['BOJ_URL']}|{os.environ['PROBLEM_ID']} - {os.environ['PROBLEM_TITLE']}>\n"
              f"- к¶ҢмһҘ нҸҙлҚ”: `{os.environ['FOLDER']}`\n"
              "- лӘЁл‘җ нҷ”мқҙнҢ…!"
          )

          payload = json.dumps({"text": text}).encode("utf-8")
          req = urllib.request.Request(
              os.environ["SLACK_WEBHOOK_URL"],
              data=payload,
              headers={"Content-Type": "application/json"},
          )
          urllib.request.urlopen(req).read()
          PY
